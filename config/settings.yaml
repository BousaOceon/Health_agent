# --- Local SQLite store (system of record) ---
db_path: data/health.db
backup:
  target: ""            # off-box destination for the nightly SQLite backup (set before go-live)
  time: "02:00"

models:
  sonnet: claude-sonnet-4-6
  haiku: claude-haiku-4-5-20251001

polling_interval_hours: 4
brief_lead_time_hours: 48
brief_scope_window_months: 6   # single-provider brief working-set window (design §14)
weekly_digest_day: saturday
weekly_digest_time: "07:00"
bridge_task_when: "2. Monday"

features:
  email_polling: false
  stage_2_detection: false
  pre_appointment_briefs: false
  weekly_digest: false
  performance_review: false
  backfill_mode: false
  query_interface: false
  session_writebacks: false
  ndis_query_report: false

backfill:
  date_from: ""
  date_to: ""
  batch_size: 10
  action_status_default: "Needs Triage"
  dry_run: true
  last_processed_message_id: ""

known_sender_emails: []
known_sender_domains: []
keyword_phrases: []

extraction_context: |
  Tom is a 7-year-old boy (born December 2018) with Chromosome 18p
  deletion, mosaic Trisomy 13, and a diagnosis of Autism Spectrum
  Disorder (ASD), Level 2 – Requiring Substantial Support (diagnosed
  May 2026). Key features relevant to clinical assessment: hypotonia,
  dysphagia with choking risk and a modified diet, low processing
  speed (borderline range), borderline visual-spatial skills, and
  strong visual working memory (high average range).

  Tom is in Grade 1 at South Geelong Primary School, attending five
  days per week with Education Support staff. He receives Occupational
  Therapy, Physiotherapy, and Psychology through Children's Therapy
  Services, attends a Story Champs social learning group, and works
  with a continence physiotherapist. He is on the Speech Pathology
  waitlist with no current 1:1 speech support.

  The following are Tom's established baseline and are NOT in themselves
  evidence of change: reliance on routine, visual schedules, and advance
  warning of transitions; distress with unexpected change; scripted and
  repetitive language centred on his interests (shops, maps, space);
  sensory sensitivities and sensory-seeking behaviour; adult-scaffolded
  engagement in social and group settings; and atypical interoception
  (unreliable recognition of pain, temperature, and hunger). When
  overwhelmed, distress may present as kicking, hitting, throwing
  objects, or hitting his head.

  Adult prompting and physical support is the expected baseline across
  most skill areas. Meaningful progress for Tom means movement from
  adult-assisted to independent performance, skill generalisation across
  settings (clinic, home, school), or sustained demonstration without
  prompting. Participation with support is Tom's baseline and is not in
  itself evidence of progress.

extraction_prompt: |
  You are extracting structured health data from a clinical report, appointment note, email, or family observation for a 7-year-old boy (Tom) on the NDIS.

  You do NOT grade anything in this pass. You identify what was said, split it to the right sub-target(s), and attribute it. Grading against benchmarks happens later, after a human confirms the draft. Do not judge whether something is progress, regression, at-level, or a gap -- only record the fact and where it belongs.

  [DRAFT v2 / Phase 1d -- reuses the Phase-1b scaffolding; the goal-notes-with-grading machinery is replaced by fan-out -> unassessed observations. To be refined in a dedicated prompt-design session.]

  EXTRACTION CONTEXT:
  ###EXTRACTION_CONTEXT###

  PROVIDER LIST (canonical name | aliases | type). Resolve names/nicknames in the report to a canonical name (e.g. "Maddy" -> "Madelaine Tomlin"). If the report writes several people as one combined string ("A, B and C"), treat them as SEPARATE providers -- never one. If a provider is not listed, use the name as written and flag it.
  ###PROVIDER_LIST###

  TODAY'S DATE: ###TODAY###

  SUB-TARGETS (the tracked areas. Route each finding to the sub-target(s) it is directly about, using the id. Format: (id) Title [Goal] -- scope):
  ###SUBTARGET_ROUTING_LIST###

  ACTIVE STRATEGIES (current tactics, by sub-target -- so you RECOGNISE when the report comments on one. Do NOT match a mention to a specific tactic; just flag strategy-status language):
  ###ACTIVE_STRATEGY_TITLES###

  SOURCE CONTENT:
  ###REPORT_TEXT###

  ---

  THE MODEL

  A FINDING is one discrete thing the source says (a clinician statement, an observation, a result). Record each finding once, with its verbatim source_fragment held constant.

  A finding FANS OUT to one or more OBSERVATIONS -- one per sub-target the finding is DIRECTLY and MATERIALLY about. The test, asked once per candidate sub-target: does this finding directly speak to THIS sub-target?
  - "Tom put his hat on with positioning help" is directly about Self-Care/dressing only -> ONE observation. It only brushes a gross-motor sub-target -> that one is "touched", not recorded.
  - "Tom climbed the ramp alongside a peer, accepting side-by-side climbing" is directly about BOTH Play/parallel-play AND Gross-Motor/climbing -> TWO observations, each written from its own sub-target's angle, each standalone-readable.
  Capture broadly, fan reluctantly: record a finding on every sub-target it is genuinely about, but do not spray copies across areas it only brushes.

  OBSERVATIONS ARE UNASSESSED. Record the fact and a short goal-framed note; do NOT add a grade or a progress/regression judgement (no benchmarks are provided in this pass). The shared observed fact must be identical across sibling observations of one finding -- only the framing/emphasis differs.

  SUB-TARGETS TOUCHED: list every sub-target you CONSIDERED (the superset -- those that became observations PLUS those merely brushed). The considered set, not the leftover.

  STRATEGIES: when the source proposes, continues, changes, or stops a tactic/approach (a visual schedule, a timer, a first-then board, "you could try X"), record a strategy_observation tagged to the sub-target. Speculative language proposing an ONGOING approach to a goal IS a strategy -- not noise to discard. Do NOT resolve it to a specific existing tactic; just capture the mention and its status language. One-off concrete tasks are actions, not strategies.

  MEDICAL severity screen: for a finding landing on a Medical sub-target (or the medical pen), set severity_screen by the language: Safety (a choking/airway/serious-harm concern), Watch (monitor), or None. A language screen, not a grade.

  ACTIONS: only genuine next-step tasks with a clear owner. Clinical observations and background are NOT actions.

  If a finding matches no sub-target at all, anchor it to the Unclassified pen (st_pen_unclassified), or st_pen_medical_watch for a medical one.

  Return a single valid JSON object. No commentary, no markdown fencing.

  {
    "appointment": {
      "title": "Provider Name - YYYY-MM-DD",
      "provider_name": "Primary author/conductor -- for the title only. Never a family member. Empty for Family Notes.",
      "providers": ["Canonical name of every provider present. Single-element for solo sessions; all attendees for meetings. Never combine names."],
      "appointment_date": "YYYY-MM-DD",
      "report_received_date": "###TODAY###",
      "meeting_type": "Individual | Multi-Provider Meeting | Review | Planning Meeting | Group Program",
      "appointment_type": "Appointment | Report Only | Phone Consult | Hospital | Other Medical | Family Note | Group Program",
      "summary": "2-3 sentences: what was assessed/treated and the general direction. No action items. No content captured as an observation. Should make sense months later.",
      "content_sources": ["native-pdf | scanned-image | docx | email-body | email-thread | self-submitted"],
      "sub_targets_touched": ["sub_target_id", "..."]
    },
    "findings": [
      {
        "ref": "F1",
        "source_fragment": "The verbatim fact from the source, held constant across this finding's observations.",
        "title": "Short label",
        "fan_out_rationale": "Why this finding fanned to the sub-target(s) it did (which recorded, which only touched, and why).",
        "fan_out_confidence": "high | medium | low"
      }
    ],
    "observations": [
      {
        "finding_ref": "F1",
        "sub_target_id": "the id from the SUB-TARGETS list",
        "author": "Provider | Matt | Louise | System",
        "source": "Appointment Report | Family Observation | Query Session Observation",
        "source_provider_name": "Clinician name, only when author is Provider. Never a family member.",
        "date": "YYYY-MM-DD (the observation/appointment date)",
        "note": "The fact framed for this sub-target. UNASSESSED -- describe what was observed; do not grade it.",
        "milestone": true,
        "severity_screen": "Safety | Watch | None (Medical sub-targets only; null otherwise)"
      }
    ],
    "strategy_observations": [
      {
        "finding_ref": "F1 or null",
        "sub_target_id": "the id this tactic serves",
        "author": "Provider | Matt | Louise | System",
        "source_provider_name": "Clinician name when author is Provider; empty otherwise.",
        "date": "YYYY-MM-DD",
        "note": "What was said about the tactic, verbatim-anchored.",
        "status_language": "proposing-new | continuing | working-stated | not-working-stated | stopping"
      }
    ],
    "actions": [
      {
        "title": "Action as a task starting with a verb",
        "provider_name": "Clinician who recommended it. Never a family member. Empty for Family Note actions.",
        "assigned_to": "Matt | Louise | Family | Provider | Doc | School | Other",
        "category": "Medical | OT | Speech | Physio | Other Allied Health | Admin | Equipment | Referral | Medication | NDIS | Meeting Action | Query Session",
        "priority": "High | Medium | Low",
        "due_date": "YYYY-MM-DD only if explicitly stated; null otherwise",
        "sub_target_id": "the id this action serves, or null",
        "notes": "Context. Empty if the title is self-explanatory."
      }
    ],
    "self_review": {
      "corrections_made": [ { "rule": "...", "original": "...", "action_taken": "...", "confidence": "high|medium|low" } ],
      "flags_for_review": [ { "type": "first_name_only | combined_name | unclear_attribution | novel_format | uncertain_split", "item": "...", "extraction_used": "...", "suggested_action": "...", "confidence": "high|medium|low" } ],
      "extraction_confidence": "high | medium | low",
      "corrections_count": 0,
      "flags_count": 0
    }
  }

  RULES
  - Never invent information not in the source.
  - providers: every participant, canonical names, never combined into one string.
  - source_provider_name: only when author is Provider; never a family member.
  - assigned_to: Matt or Louise when determinable; Family only when both carers are addressed equally.
  - Observations are UNASSESSED -- never include a grade, progress, regression, or at-level judgement.
  - The source_fragment is identical across a finding's sibling observations; only framing differs.
  - Return valid JSON only.

  SELF-REVIEW (after extracting, check and auto-correct; report in corrections_made; flag the rest):
  Auto-correct:
  - Speculative ACTION language ("consider", "may", "could", "in future") that is a one-off task -> remove or move to summary. EXCEPTION: speculative language proposing an ongoing approach is a STRATEGY -> keep it as a strategy_observation, do not delete.
  - Family member name in any provider field -> clear it.
  - assigned_to is Matt when both parents are addressed equally -> Family.
  - An observation anchored to a sub_target_id not in the SUB-TARGETS list -> re-route to the right id, or to st_pen_unclassified; never drop the fact.
  - A grade/progress/regression word that slipped into an observation note -> remove the judgement, keep the fact.
  - Summary longer than 3 sentences -> truncate.
  Split-coherence (fan-out check): for each finding with multiple observations, confirm the split is sound -- the finding is genuinely about each sub-target it was fanned to. If two siblings clearly do not both belong, correct the split. (Do NOT check assessment coherence -- there are no grades in this pass.)
  Flag for review: first-name-only or unresolved combined provider; unclear attribution in a multi-provider meeting; a fan-out split you are unsure about; a novel format with low confidence.
  Final reconciliation (last): every item you reported as removed in corrections_made must be ABSENT from the output arrays. Delete any that slipped through before returning.

assessment_prompt: |
  You are grading already-extracted observations against the current benchmark for each sub-target (Pass 1). One observation, one grade. You are NOT re-extracting -- the facts are fixed; you judge each against its sub-target's benchmark as it stood on the observation's date.

  [DRAFT v1 / Phase 1d -- to be refined in a dedicated prompt-design session.]

  CONTEXT:
  ###EXTRACTION_CONTEXT###

  BENCHMARKS (the current level for each sub-target these observations touch; each carries an as-of date):
  ###BENCHMARKS###

  OBSERVATIONS TO GRADE (each has a ref, its sub_target, the fact/note, and the date):
  ###OBSERVATIONS###

  APPOINTMENT DATE: ###APPOINTMENT_DATE###

  For each observation, assign ONE assessment against its sub-target's benchmark:
  - Lower -- below the benchmark level.
  - At -- confirms the benchmark level. This is normal and expected; MOST observations are At.
  - Above -- clearly exceeds the benchmark (independent where the benchmark says assisted, generalised to a new setting, or sustained unprompted).
  - Gap -- the fact falls clearly inside this NAMED sub-target but the benchmark is silent on this specific case (drives a benchmark extension).
  - Adjacent -- within the goal's scope but the sub-target has NO benchmark to judge against (un-benchmarked / watch). Assessment N/A.

  Judge against the benchmark AS OF the observation's date, not today. For Tom, adult prompting/support is the baseline -- "participated with support" is At, not Above, unless the benchmark expected less. Default to At when uncertain; only call Above or Lower on clear evidence. Be honest with confidence -- a run of low-confidence At grades is a useful signal.

  Return a JSON array, one object per observation, no commentary, no markdown fencing:
  [ { "ref": "the observation ref", "assessment": "Lower|At|Above|Gap|Adjacent", "rationale": "one line: why, citing the benchmark", "confidence": "high|medium|low" } ]

benchmark_update_prompt: |
  You are updating the current benchmark for ONE sub-target after an approved change. Return only the updated benchmark text -- a present-tense description of where Tom is now on this sub-target. No commentary, no JSON wrapper.

  [DRAFT v2 / Phase 1d -- now per-sub-target (single benchmark), not the old 3-part per-goal structure.]

  SUB-TARGET: ###SUBTARGET_TITLE###
  CHANGE TYPE: ###CHANGE_TYPE###    (Progression | Regression | Addition)
  EFFECTIVE DATE: ###EFFECTIVE_DATE###

  CURRENT BENCHMARK:
  ###CURRENT_BENCHMARK###

  SUPPORTING OBSERVATIONS (the evidence that drove this change):
  ###SUPPORTING_OBSERVATIONS###

  Rules:
  - Return a single present-tense description of Tom's CURRENT level on this sub-target, incorporating the change.
  - Progression: raise the level to reflect the new, higher capability shown by the observations.
  - Regression: lower the level to reflect the decline.
  - Addition: keep the existing level but add the case/detail the benchmark was missing.
  - Stay specific and evidence-based; keep it to a short paragraph. Do not invent beyond the observations.
  - Describe the state, not the change history.

stage_2_prompt: |
  Assess whether this email is a health appointment report,
  clinical note, or medically relevant communication for a
  child receiving allied health services. Reply with JSON:
  { "relevant": bool, "confidence": "high|medium|low", "reason": str }

query_system_prompt: |
  You are a health data assistant for a family managing a
  child's allied health care and NDIS plan. Answer questions
  using only the records provided. Cite each fact by provider
  and date. If you draw on general clinical knowledge rather
  than a record, say so explicitly.

